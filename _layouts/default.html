<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>
        {% if page.title == "Home" %}
            {{ site.title }}
        {% else %}
            {{ page.title }} | {{ site.title }}
        {% endif %}
    </title>

    <meta name="description" content="{{ page.description | default: site.description }}">
    <meta name="author" content="Prabhas Gupte">

    <link rel="icon" href="{{ site.baseurl }}/assets/img/favicon.ico">

    <link rel="stylesheet" href="{{ site.baseurl }}/css/styles.css">

    {% if jekyll.environment == "production" %}
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=UA-55200471-3"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'UA-55200471-3');
    </script>
    {% endif %}
</head>

<body>

<header class="site-header">

    <div class="container">

        <h1 class="site-title">
            <a href="{{ site.baseurl }}/">Prabhas Gupte</a>
        </h1>

        <nav class="site-nav">
            <!-- <a href="{{ site.baseurl }}/">Home</a> -->
            <a href="{{ site.baseurl }}/about">About</a>
            <a href="{{ site.baseurl }}/resume">Experience</a>
            <a href="{{ site.baseurl }}/insights">Insights</a>
            <a href="{{ site.baseurl }}/now">Now</a>
        </nav>

    </div>

</header>

<main class="container">

{{ content }}

</main>

<footer class="site-footer">

    <div class="container">

        <p>
            <a href="https://github.com/pmgupte">GitHub</a>
            ·
            <a href="https://www.linkedin.com/in/pmgupte/">LinkedIn</a>
            ·
            <a href="mailto:YOUR_EMAIL">Email</a>
        </p>

        <p>
            © {{ "now" | date: "%Y" }} Prabhas Gupte
        </p>

    </div>

</footer>

</body>

</html>
